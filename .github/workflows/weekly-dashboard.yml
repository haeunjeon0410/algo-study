name: Weekly Dashboard

on:
  push:
    branches:
      - main # 공용 레포 main에 머지(push)되는 순간 무조건 실행

  workflow_dispatch:

  schedule:
    - cron: '0 15 * * 0' # 일요일 15:00 UTC = 한국 시간(KST) 월요일 00:00 (자정 리셋용)

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: weekly-dashboard
  cancel-in-progress: true

jobs:
  dashboard:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Debug Workflow Context
        run: |
          echo "===== GITHUB CONTEXT ====="
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "repository=${{ github.repository }}"
          echo "actor=${{ github.actor }}"

      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. 현재 실행 시점의 정확한 KST 시간 구하기
            const now = new Date();
            const kstNow = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
            
            const day = kstNow.getDay(); // 일요일: 0, 월요일: 1, 화요일: 2 ...
            
            // 현재 요일이 언제든 간에 '이번 주 월요일'로 돌아가는 오프셋 계산
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0); // 이번 주 월요일 00:00:00 KST로 설정
            
            const targetMonday = new Date(kstNow.getTime());

            // 2. 닫힌 PR 목록 전체 조회
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "closed",
              per_page: 100
            });

            // 3. 이번 주 월요일 00:00 KST 이후에 머지된 PR만 정확히 필터링
            const weekly = pulls.filter(pr => pr.merged_at && new Date(pr.merged_at) >= targetMonday);

            const counts = {};
            weekly.forEach(pr => {
              const author = pr.user.login;
              counts[author] = (counts[author] || 0) + 1;
            });

            // 4. 요청하신 마크다운 출력 포맷 반영
            const dateStr = kstNow.toISOString().slice(0, 10);
            let table = `📅 기준 주간 시작: ${dateStr} (월요일 00:00 KST)\n\n`;
            table += "| Member | Count | Status |\n|--------|-------|--------|\n";

            const authors = Object.keys(counts).sort();
            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status = count >= 5 ? "✅" : "❌";
                table += `| ${user} | ${count} | ${status} |\n`;
              });
            }

            fs.writeFileSync("dashboard_table.txt", table);

      - name: Inject Dashboard into README
        run: |
          python <<'PY'
          from pathlib import Path
          import sys

          readme = Path("README.md")
          table = Path("dashboard_table.txt")

          if not readme.exists() or not table.exists():
              print("Required files missing.", file=sys.stderr)
              sys.exit(1)

          content = readme.read_text(encoding="utf-8")
          dashboard = table.read_text(encoding="utf-8").strip()

          start_marker = ""
          end_marker = ""

          # 마커 존재 여부 선행 검증 (Split 에러 차단)
          if start_marker not in content:
              print(f"Error: Cannot find '{start_marker}' in README.md", file=sys.stderr)
              sys.exit(1)
          if end_marker not in content:
              print(f"Error: Cannot find '{end_marker}' in README.md", file=sys.stderr)
              sys.exit(1)

          try:
              before = content.split(start_marker)[0]
              after = content.split(end_marker)[1]
          except Exception as e:
              print(f"Split failed: {e}", file=sys.stderr)
              sys.exit(1)

          # 데이터 주입 및 리드미 업데이트
          updated_content = before + start_marker + "\n" + dashboard + "\n" + end_marker + after
          readme.write_text(updated_content, encoding="utf-8")
          print("README updated successfully!")
          PY

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "📊 weekly dashboard update [skip ci]"
          git pull --rebase origin main

          for i in 1 2 3
          do
            git push origin HEAD:main && break
            echo "Push failed. Retry $i/3"
            if [ $i -eq 3 ]; then exit 1; fi
            sleep 5
          done
