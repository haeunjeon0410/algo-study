name: Weekly Dashboard

on:
  push:
    branches:
      - main # PR이 머지되어 main에 반영되는 순간 자동으로 실행됨

  workflow_dispatch: # 필요 시 수동 실행 가능

  # 매주 월요일 00:00 KST (UTC 일요일 15:00)
  schedule:
    - cron: '0 15 * * 0'

permissions:
  contents: write # README 수정을 위해 필수
  pull-requests: read # PR 목록 조회를 위해 필요

concurrency:
  group: weekly-dashboard
  cancel-in-progress: true

jobs:
  dashboard:
    # 봇이 스스로 만든 커밋에 의한 무한 루프 방지
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # =========================================
      # 0️⃣ Repository Checkout
      # =========================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # =========================================
      # 1️⃣ Weekly PR Stats 생성 (github-script 사용)
      # =========================================
      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const now = new Date();
            const kstNow = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
            const day = kstNow.getDay();
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0);
            const mondayUTC = new Date(kstNow.toISOString());

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "closed",
              per_page: 100
            });

            const weekly = pulls.filter(pr => pr.merged_at && new Date(pr.merged_at) >= mondayUTC);

            const counts = {};
            weekly.forEach(pr => {
              const author = pr.user.login;
              counts[author] = (counts[author] || 0) + 1;
            });

            let table = `📅 기준 주간 시작: ${kstNow.toISOString().slice(0, 10)} (월요일 00:00 KST)\n\n`;
            table += "| Member | Count | Status |\n|--------|-------|--------|\n";

            const authors = Object.keys(counts).sort();
            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status = count >= 5 ? "✅" : "❌";
                table += `| ${user} | ${count} | ${status} |\n`;
              });
            }

            fs.writeFileSync("dashboard_table.txt", table);

      # =========================================
      # 2️⃣ README 업데이트 (포매터/IDE 자동삭제 방지 적용)
      # =========================================
      - name: Inject Dashboard into README
        run: |
          python <<'PY'
          from pathlib import Path
          import sys

          readme = Path("README.md")
          table = Path("dashboard_table.txt")

          if not readme.exists() or not table.exists():
              print("Required files missing.", file=sys.stderr)
              sys.exit(1)

          content = readme.read_text(encoding="utf-8")
          dashboard = table.read_text(encoding="utf-8").strip()

          # HTML 주석 형태를 유지하면서 에디터 자동 삭제를 피하기 위한 문자열 조립
          start_marker = "<" + "!-- WEEKLY_DASHBOARD_START --" + ">"
          end_marker = "<" + "!-- WEEKLY_DASHBOARD_END --" + ">"

          if start_marker not in content or end_marker not in content:
              print(f"Error: Cannot find markers in README.md\nTarget: {start_marker}", file=sys.stderr)
              sys.exit(1)

          try:
              before = content.split(start_marker)[0]
              after = content.split(end_marker)[1]
          except ValueError as e:
              print(f"Split failed: {e}", file=sys.stderr)
              sys.exit(1)

          updated_content = before + start_marker + "\n" + dashboard + "\n" + end_marker + after
          readme.write_text(updated_content, encoding="utf-8")
          print("README updated successfully!")
          PY

      # =========================================
      # 3️⃣ Commit & Push (공용 레포 main에 반영)
      # =========================================
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "📊 weekly dashboard update"
          git pull --rebase origin main

          for i in 1 2 3
          do
            git push origin HEAD:main && break
            echo "Push failed. Retry $i/3"
            if [ $i -eq 3 ]; then exit 1; fi
            sleep 5
          done
